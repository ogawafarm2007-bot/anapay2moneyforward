name: ANA Pay to Money Forward

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *' # 日本時間 朝6時

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Firefox and Geckodriver
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 'latest'

      # --- ここを追加：日本語フォントをインストール ---
      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      # ------------------------------------------

      - name: Install Geckodriver
        run: |
          # 0.34.0 から 0.36.0 に変更
          wget https://github.com/mozilla/geckodriver/releases/download/v0.36.0/geckodriver-v0.36.0-linux64.tar.gz
          tar -xvzf geckodriver-v0.36.0-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials and token files
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GCP_TOKEN }}' > token.json

      - name: Run script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python anapay2mf.py

      # --- ここから追加 ---
      - name: Upload Error Screenshot
        if: failure()  # 失敗した時だけ実行
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: login_error.png
      # --- ここまで追加 ---
